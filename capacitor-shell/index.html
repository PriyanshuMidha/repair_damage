<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Repair Control Room</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
      }

      body {
        align-items: center;
        background: linear-gradient(135deg, #f8edd7 0%, #eef1dc 48%, #e6efe8 100%);
        color: #172018;
        display: grid;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(216, 205, 181, 0.86);
        border-radius: 12px;
        max-width: 520px;
        padding: 24px;
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        margin: 0 0 12px;
      }

      p {
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Repair Control Room</h1>
      <p>This Android shell is ready. Set <code>CAPACITOR_SERVER_URL</code> to your deployed HTTPS app before building the APK.</p>
    </main>
  </body>
</html>
